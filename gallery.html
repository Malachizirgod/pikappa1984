<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Pi Kappa Chapter | Alpha Phi Alpha Fraternity, Inc.</title>
<meta name="description" content="Photos from Pi Kappa Chapter events, ceremonies, service projects, and brotherhood moments since 1984.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
.gallery-filter {
  display:flex; align-items:center;
  padding:0 clamp(12px,3vw,40px);
  border-bottom:1px solid var(--border);
  overflow-x:auto; background:var(--charcoal);
  -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.gallery-filter::-webkit-scrollbar { display:none; }
.filter-label {
  font-size:clamp(9px,2vw,10px); letter-spacing:0.18em; text-transform:uppercase;
  color:var(--gray); padding:14px 14px 14px 0; white-space:nowrap;
  border-right:1px solid var(--border); margin-right:12px; flex-shrink:0;
}
.filter-btn {
  padding:14px clamp(10px,2.5vw,18px); font-size:clamp(9px,2.2vw,11px);
  letter-spacing:0.1em; text-transform:uppercase; color:var(--gray);
  cursor:pointer; border:none; border-bottom:2px solid transparent;
  background:none; transition:all 0.2s; white-space:nowrap; flex-shrink:0;
  font-family:inherit;
}
.filter-btn:hover, .filter-btn.active { color:var(--gold); border-bottom-color:var(--gold); }

.gallery-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(min(280px,100%), 1fr));
  gap:2px;
  padding:clamp(16px,3vw,32px) clamp(12px,3vw,40px) clamp(40px,6vw,72px);
}

.gallery-item {
  position:relative; overflow:hidden; aspect-ratio:4/3;
  background:var(--charcoal); border:1px solid var(--border);
  cursor:pointer; transition:border-color 0.3s;
  animation:fadeIn 0.5s ease both;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.gallery-item:hover { border-color:rgba(184,134,11,0.55); }

.gallery-item img {
  width:100%; height:100%; object-fit:cover;
  transition:transform 0.5s ease;
}
.gallery-item:hover img { transform:scale(1.04); }

.gallery-caption {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(transparent, rgba(0,0,0,0.88));
  padding:32px 14px 12px;
  font-size:clamp(9px,1.8vw,11px); letter-spacing:0.12em;
  text-transform:uppercase; color:var(--gold);
  opacity:0; transition:opacity 0.3s;
}
.gallery-item:hover .gallery-caption { opacity:1; }

/* Placeholder tiles */
.gallery-placeholder {
  position:relative; overflow:hidden; aspect-ratio:4/3;
  background:var(--charcoal); border:1px dashed var(--border);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
.gallery-placeholder svg {
  width:clamp(28px,5vw,40px); height:clamp(28px,5vw,40px);
  fill:none; stroke:var(--gold); stroke-width:1.2; opacity:0.3;
}
.gallery-placeholder span {
  font-size:clamp(9px,1.8vw,10px); letter-spacing:0.16em;
  text-transform:uppercase; color:var(--gray); text-align:center;
}

/* Lightbox */
.lightbox {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.94); z-index:2000;
  align-items:center; justify-content:center;
  padding:clamp(16px,3vw,40px);
}
.lightbox.open { display:flex; }
.lightbox-inner { position:relative; max-width:900px; width:100%; }
.lightbox-inner img { width:100%; max-height:80vh; object-fit:contain; display:block; border:1px solid var(--border); }
.lightbox-close {
  position:absolute; top:-36px; right:0;
  font-size:clamp(10px,2vw,12px); letter-spacing:0.2em; text-transform:uppercase;
  color:var(--gold); cursor:pointer; background:none; border:none; padding:4px;
}
.lightbox-caption {
  margin-top:10px; font-size:clamp(9px,1.8vw,11px); letter-spacing:0.12em;
  text-transform:uppercase; color:var(--sand); text-align:center;
}
</style>
</head>
<body>
<div id="nav-inject"></div>

<div class="page-header">
  <span class="eyebrow">Pi Kappa Chapter</span>
  <h1>Chapter <em>Gallery</em></h1>
  <div class="gold-bar"></div>
  <p>A visual record of Pi Kappa brotherhood — events, service, ceremonies, and moments that define who we are.</p>
</div>

<div class="gallery-filter">
  <span class="filter-label">Filter</span>
  <button class="filter-btn active" onclick="filterGallery('all',this)">All</button>
  <button class="filter-btn" onclick="filterGallery('events',this)">Events</button>
  <button class="filter-btn" onclick="filterGallery('service',this)">Service</button>
  <button class="filter-btn" onclick="filterGallery('brotherhood',this)">Brotherhood</button>
  <button class="filter-btn" onclick="filterGallery('history',this)">History</button>
</div>

<div class="gallery-grid" id="gallery-grid">
  <!-- Real photo: 40th Anniversary -->
  <div class="gallery-item" data-category="events" onclick="openLightbox('assets/anniversary.jpg','Pi Kappa Chapter — 40th Anniversary, 2024')">
    <img src="assets/anniversary.jpg" alt="Pi Kappa 40th Anniversary">
    <div class="gallery-caption">40th Anniversary — 2024</div>
  </div>

  <!-- Placeholders for future photos -->
  <div class="gallery-placeholder" data-category="brotherhood">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
    <span>Brotherhood</span>
  </div>
  <div class="gallery-placeholder" data-category="service">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
    <span>Service</span>
  </div>
  <div class="gallery-placeholder" data-category="events">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
    <span>Events</span>
  </div>
  <div class="gallery-placeholder" data-category="history">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
    <span>History</span>
  </div>
  <div class="gallery-placeholder" data-category="brotherhood">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
    <span>Brotherhood</span>
  </div>
  <div class="gallery-placeholder" data-category="service">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
    <span>Service</span>
  </div>
  <div class="gallery-placeholder" data-category="events">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
    <span>Events</span>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">&#10005; Close</button>
    <img id="lightbox-img" src="" alt="">
    <div class="lightbox-caption" id="lightbox-caption"></div>
  </div>
</div>

<div id="footer-inject"></div>
<script src="assets/components.js"></script>
<script>
  document.getElementById('nav-inject').innerHTML = getNav('gallery.html');
  document.getElementById('footer-inject').innerHTML = getFooter();
  document.getElementById('nav-toggle').addEventListener('click', () => {
    document.getElementById('nav-mobile').classList.toggle('open');
  });

  function filterGallery(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('#gallery-grid > [data-category]').forEach(el => {
      el.style.display = (cat === 'all' || el.dataset.category === cat) ? '' : 'none';
    });
  }

  function openLightbox(src, caption) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox-caption').textContent = caption;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox(e) {
    if (!e || e.target === document.getElementById('lightbox') || e.target.classList.contains('lightbox-close')) {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox({ target: document.getElementById('lightbox') });
  });
</script>
</body>
</html>
